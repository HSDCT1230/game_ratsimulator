<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鼠生总结配乐试听</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6efe5;
      --panel: #fffaf2;
      --line: rgba(112, 83, 56, 0.16);
      --text: #45352a;
      --muted: #776353;
      --accent: #d87755;
      --green: #5d9b80;
      --shadow: rgba(92, 63, 36, 0.13);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0)),
        radial-gradient(circle at 18% 8%, rgba(255, 214, 157, 0.34), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
    }

    main {
      width: min(1060px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 30px 0 46px;
    }

    header {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 4vw, 38px);
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-weight: 680;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }

    .card {
      display: grid;
      gap: 10px;
      padding: 14px;
      background: rgba(255, 250, 242, 0.92);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 14px 32px var(--shadow);
    }

    .id {
      width: fit-content;
      padding: 3px 9px;
      border-radius: 999px;
      background: rgba(93, 155, 128, 0.16);
      color: #356d58;
      font-size: 12px;
      font-weight: 900;
    }

    .name {
      font-size: 17px;
      font-weight: 900;
    }

    .meta,
    .use {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .use {
      min-height: 42px;
    }

    audio {
      width: 100%;
      height: 38px;
    }

    a {
      color: #9e4f38;
      font-weight: 850;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .note {
      margin-top: 18px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 242, 0.78);
      color: var(--muted);
      font-size: 13px;
      font-weight: 680;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>鼠生总结配乐试听</h1>
      <p>summary-a 已接入游戏作为“鼠生总结 / 通关胶片”配乐；本页只保留当前正式配置。</p>
    </header>

    <section class="grid" id="candidateList"></section>

    <div class="note">
      Mixkit 候选均标记为 Mixkit Stock Music Free License，来源页见每张卡片；当前主 BGM 仍来自 Pixabay，证明材料在 <code>docs/pixabay-download-proof/</code>。
      当前正式绑定：<code>summary-a</code> 已复制到 <code>bgm/secret-garden-mixkit-595.mp3</code>，并同步写入 <code>CREDITS.md</code>。
    </div>
  </main>

  <script>
    const candidates = [
      {
        id: 'summary-a',
        name: 'Secret Garden',
        author: 'Eugenio Mininni / Mixkit',
        duration: '2:33',
        use: '已接入鼠生总结配乐。胶片感最强，适合鼠生回顾、死亡总结和温柔谢幕。',
        file: 'life-summary-bgm-candidates/summary-a-secret-garden-mixkit-595.mp3',
        source: 'https://mixkit.co/free-stock-music/discover/secret-garden-595/'
      }
    ];

    const list = document.getElementById('candidateList');
    candidates.forEach((item) => {
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `
        <div class="id">${item.id}</div>
        <div class="name">${item.name}</div>
        <div class="meta">${item.author} · ${item.duration}</div>
        <div class="use">${item.use}</div>
        <audio controls preload="none" src="${item.file}"></audio>
        <a href="${item.source}" target="_blank" rel="noreferrer">来源 / license</a>
      `;
      list.appendChild(card);
    });
  </script>
</body>
</html>
