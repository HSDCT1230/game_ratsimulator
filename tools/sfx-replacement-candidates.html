<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鼠鼠模拟器 - 已接入音效试听</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f1e8;
      --panel: #fffaf2;
      --line: rgba(118, 88, 58, 0.16);
      --text: #493629;
      --muted: #806d5e;
      --accent: #dd7c58;
      --green: #6fae8a;
      --shadow: rgba(105, 76, 48, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.64), rgba(255,255,255,0)),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
    }

    main {
      width: min(980px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    header {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 4vw, 38px);
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-weight: 650;
    }

    .section-title {
      margin: 22px 0 10px;
      font-size: 18px;
      font-weight: 900;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }

    .card {
      display: grid;
      gap: 10px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 28px var(--shadow);
    }

    .card.selected {
      border-color: rgba(111, 174, 138, 0.54);
      background: linear-gradient(180deg, rgba(245, 255, 249, 0.94), var(--panel));
    }

    .id {
      width: fit-content;
      padding: 3px 9px;
      border-radius: 999px;
      background: rgba(111, 174, 138, 0.16);
      color: #39735d;
      font-size: 12px;
      font-weight: 900;
    }

    .selected .id {
      background: rgba(111, 174, 138, 0.28);
    }

    .name {
      font-size: 16px;
      font-weight: 900;
    }

    .use {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .selected-mark {
      width: fit-content;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(221, 124, 88, 0.14);
      color: #a4573e;
      font-size: 12px;
      font-weight: 900;
    }

    audio {
      width: 100%;
      height: 38px;
    }

    a {
      color: #9e4f38;
      font-weight: 800;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .note {
      margin-top: 18px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 242, 0.74);
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>已接入音效试听</h1>
      <p>这里只保留当前正式配置：`snap1.mp3` 使用 `snap-a`，`please-help-me.mp3` 使用 `help-c`。</p>
    </header>

    <div class="section-title">替换 `snap1`：拖鞋拍到 / 短促打击</div>
    <section class="grid" id="snapList"></section>

    <div class="section-title">替换 `please-help-me`：冷到/感冒/复活提示</div>
    <section class="grid" id="helpList"></section>

    <div class="note">
      来源均为 Mixkit，许可见 <a href="https://mixkit.co/license/" target="_blank" rel="noreferrer">Mixkit Free License</a>。
      当前页面只用于确认正式绑定结果；未采用的候选已经删除。再次替换前先补 CREDITS 记录。
    </div>
  </main>

  <script>
    const candidates = [
      {
        group: 'snap',
        id: 'snap-a',
        name: 'Impact of a blow',
        selected: true,
        use: '最像拖鞋打到地面的短促重击。',
        file: 'sfx-candidates/snap-a-mixkit-impact-of-a-blow-2150-preview.mp3',
        source: 'https://mixkit.co/free-sound-effects/download/2150/?context=item+grid'
      },
      {
        group: 'help',
        id: 'help-c',
        name: 'Creature cry of hurt',
        selected: true,
        use: '痛感更明显，适合失败/受伤。',
        file: 'sfx-candidates/help-c-mixkit-creature-cry-of-hurt-2208-preview.mp3',
        source: 'https://mixkit.co/free-sound-effects/download/2208/?context=item+grid'
      }
    ];

    function renderList(targetId, group) {
      const target = document.getElementById(targetId);
      target.innerHTML = '';
      candidates.filter((item) => item.group === group).forEach((item) => {
        const card = document.createElement('article');
        card.className = item.selected ? 'card selected' : 'card';
        card.innerHTML = `
          <div class="id">${item.id}</div>
          <div class="name">${item.name}</div>
          ${item.selected ? '<div class="selected-mark">已接入正式游戏</div>' : ''}
          <div class="use">${item.use}</div>
          <audio controls preload="none" src="${item.file}"></audio>
          <a href="${item.source}" target="_blank" rel="noreferrer">来源 / license</a>
        `;
        target.appendChild(card);
      });
    }

    renderList('snapList', 'snap');
    renderList('helpList', 'help');
  </script>
</body>
</html>
