<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鼠鼠模拟器 - 意外风险音效试听</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --panel: #fffaf0;
      --text: #4f3b2f;
      --muted: #8d7662;
      --line: rgba(135, 108, 80, 0.18);
      --accent: #d9825b;
      --accent-2: #6fb7a8;
      --danger: #c95f5f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 16% 0%, rgba(255, 210, 148, 0.36), transparent 32%),
        radial-gradient(circle at 88% 8%, rgba(137, 205, 190, 0.30), transparent 30%),
        linear-gradient(180deg, #fffaf1 0%, var(--bg) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
    }

    main {
      width: min(1120px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    header {
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .toolbar,
    .card {
      background: rgba(255, 250, 240, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.76);
      border-radius: 18px;
      box-shadow: 0 16px 34px rgba(111, 86, 60, 0.12);
      backdrop-filter: blur(18px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      margin: 18px 0;
      padding: 14px;
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input[type="range"] {
      width: min(360px, 100%);
      accent-color: var(--accent);
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 999px;
      padding: 9px 16px;
      background: linear-gradient(180deg, #ffe2bd, #f3b071);
      color: #55331f;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 7px 0 rgba(172, 103, 54, 0.22), 0 10px 20px rgba(180, 105, 55, 0.16);
    }

    button.secondary {
      background: linear-gradient(180deg, #d8f1e8, #94d2c2);
      color: #28564e;
      box-shadow: 0 7px 0 rgba(68, 140, 126, 0.20), 0 10px 20px rgba(74, 139, 127, 0.14);
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 4px 0 rgba(172, 103, 54, 0.20), 0 8px 18px rgba(180, 105, 55, 0.12);
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .card {
      display: grid;
      grid-template-columns: 54px minmax(170px, 1.15fr) minmax(180px, 1fr) minmax(190px, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
    }

    .idx {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(217, 130, 91, 0.14);
      color: var(--accent);
      font-weight: 900;
    }

    .event {
      font-weight: 900;
      font-size: 16px;
    }

    .meta,
    .note {
      color: var(--muted);
      font-size: 13px;
    }

    .file {
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .tag {
      display: inline-flex;
      width: fit-content;
      margin-top: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(111, 183, 168, 0.16);
      color: #3f7e72;
      font-size: 12px;
      font-weight: 800;
    }

    .danger {
      background: rgba(201, 95, 95, 0.12);
      color: var(--danger);
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-weight: 700;
    }

    @media (max-width: 860px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .card {
        grid-template-columns: 46px minmax(0, 1fr);
      }

      .sound,
      .note,
      .actions {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>意外风险音效试听</h1>
      <p>这里只用于试听和确认，不会改动游戏音效绑定。听完后把编号告诉我，我再配置进正式游戏。</p>
    </header>

    <section class="toolbar">
      <label>
        试听总音量
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.55">
      </label>
      <button class="secondary" id="stopBtn" type="button">停止播放</button>
      <div class="status" id="status">等待试听</div>
    </section>

    <section class="grid" id="list"></section>
  </main>

  <script>
    const soundBase = '../sound effect/';
    const risks = [
      {
        id: 1,
        event: '被猫发现 / 猫爪逃生',
        scene: '门外找吃的、云游四方等猫风险',
        sound: 'cute-cat-meow.mp3',
        bind: 'cat',
        note: '保留明确的猫叫，适合猫风险和被猫抓住。'
      },
      {
        id: 2,
        event: '中毒 / 吃坏肚子',
        scene: '垃圾、厨余、植物、零食中毒',
        sound: 'dizzy-take-slide-whistle.wav',
        bind: 'poison',
        note: '滑落感和晕眩感明显，适合中毒。'
      },
      {
        id: 3,
        event: '拖鞋拍到 / 陌生人驱赶',
        scene: '路边出恭、云游四方等拖鞋风险',
        sound: 'snap1.wav',
        gain: 1.3,
        bind: 'slipper',
        note: '短促拍击感，正式游戏音量已调高；试听时也会略放大。'
      },
      {
        id: 4,
        event: '严重触电',
        scene: '咬电线严重触电、电死',
        sound: 'electriczap.flac',
        bind: 'shockDeath',
        note: '冲击感强，建议用于致命或严重触电。'
      },
      {
        id: 5,
        event: '轻微触电',
        scene: '咬电线电了一下但没死',
        sound: 'electriczap.flac',
        bind: 'electricZap',
        note: '同一素材低音量使用，和严重触电区分。'
      },
      {
        id: 6,
        event: '噎住 / 卡喉',
        scene: '连续吃饭、偷零食、啃树枝、包装卡住',
        sound: 'mixkit-male-clearing-the-throat-2226.wav',
        bind: 'choke',
        note: '短促清嗓声，比冲击音更像卡喉后的咳一下。'
      },
      {
        id: 7,
        event: '被夹住 / 被压住',
        scene: '沙发缝、橱柜门、花盆、门缝',
        sound: 'rat-shout.ogg',
        bind: 'crush',
        note: '用鼠鼠叫声表现被夹住时的惊慌，比拍击声更可爱。'
      },
      {
        id: 8,
        event: '头卡住 / 线缠住',
        scene: '出笼卡住、地毯线缠住、啃窗帘被布线缠住',
        sound: 'rat-shout.ogg',
        bind: 'stuck / tangle',
        note: '用鼠鼠叫声表现惊慌，比拍击更可爱。'
      },
      {
        id: 9,
        event: '摔落 / 滑落',
        scene: '阳台看云、爬晾衣杆',
        sound: 'dizzy-take-slide-whistle.wav',
        bind: 'fall',
        note: '滑音适合“脚滑、掉下去”的感觉。'
      },
      {
        id: 10,
        event: '中暑 / 晒晕',
        scene: '阳台晒太阳晒过头',
        sound: 'dizzy-take-slide-whistle.wav',
        bind: 'heatstroke',
        note: '和晕眩一致，但正式配置时可降低音量。'
      },
      {
        id: 11,
        event: '着凉 / 感冒',
        scene: '频繁出笼、阳台吹风',
        sound: 'please-help-me.ogg',
        bind: 'cold',
        note: '声音较弱，适合轻伤提醒，不会太吓人。'
      },
      {
        id: 12,
        event: '迷路',
        scene: '第一次溜进客厅可能迷路',
        sound: 'mixkit-video-game-mystery-alert-234.wav',
        bind: 'lost',
        note: '短促又带一点迷糊感，比普通弹窗音更适合“走错路了”。'
      },
      {
        id: 13,
        event: '水淹 / 被冲走',
        scene: '门外钻下水道',
        sound: 'mixkit-jump-into-the-water-1180.wav',
        bind: 'drown',
        note: '真实落水水花声，适合下水道被水冲到的瞬间。'
      },
      {
        id: 14,
        event: '冻伤 / 在门外太久',
        scene: '门外连续停留超过10小时',
        sound: 'please-help-me.ogg',
        bind: 'freeze',
        note: '较可怜的短音，适合冻得发抖。'
      },
      {
        id: 15,
        event: '主人发现',
        scene: '客厅、厨房、阳台、门外被主人发现',
        sound: 'mixkit-female-astonished-gasp-964.wav',
        bind: 'ownerDiscovered',
        note: '短促惊讶人声，像主人突然发现鼠鼠。'
      },
      {
        id: 16,
        event: '老板抓包',
        scene: 'call 主人失败',
        sound: 'mixkit-double-beep-tone-alert-2868.wav',
        bind: 'bossCaught',
        note: '改用短促双提示音，和抓包提示更统一。'
      }
    ];

    let currentAudio = null;
    const list = document.getElementById('list');
    const status = document.getElementById('status');
    const volume = document.getElementById('volume');

    function stopCurrent() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      currentAudio = null;
      status.textContent = '已停止';
    }

    function playRisk(risk) {
      stopCurrent();
      const audio = new Audio(soundBase + risk.sound);
      audio.volume = Math.min(1, Number(volume.value) * (risk.gain || 1));
      currentAudio = audio;
      status.textContent = `正在试听 #${risk.id} ${risk.event}`;
      audio.addEventListener('ended', () => {
        if (currentAudio === audio) {
          currentAudio = null;
          status.textContent = `已播放 #${risk.id}`;
        }
      });
      audio.play().catch(() => {
        status.textContent = '浏览器阻止了播放，请再点一次试听按钮';
      });
    }

    function render() {
      list.innerHTML = '';
      risks.forEach((risk) => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="idx">#${risk.id}</div>
          <div>
            <div class="event">${risk.event}</div>
            <div class="meta">${risk.scene}</div>
            <span class="tag ${risk.id <= 6 ? 'danger' : ''}">${risk.bind}</span>
          </div>
          <div class="sound">
            <div class="meta">建议音效</div>
            <div class="file">${risk.sound}</div>
          </div>
          <div class="note">${risk.note}</div>
          <div class="actions">
            <button type="button">试听</button>
          </div>
        `;
        card.querySelector('button').addEventListener('click', () => playRisk(risk));
        list.appendChild(card);
      });
    }

    document.getElementById('stopBtn').addEventListener('click', stopCurrent);
    volume.addEventListener('input', () => {
      if (currentAudio) {
        const activeId = Number((status.textContent.match(/#(\d+)/) || [])[1]);
        const activeRisk = risks.find((risk) => risk.id === activeId);
        currentAudio.volume = Math.min(1, Number(volume.value) * ((activeRisk && activeRisk.gain) || 1));
      }
    });
    render();
  </script>
</body>
</html>
